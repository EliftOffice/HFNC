<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HFNC Coaches</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI',sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg,#042d1c,#0d5c3a,#083c28);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,215,0,.3);
            border-radius: 50px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        h1 {
            margin-top: 15px;
            font-size: 42px;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 10px;
            color: #d1d5db;
        }

        .content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .card {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,.25);
        }

        .form-title {
            font-size: 22px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,.08);
            color: white;
            outline: none;
        }

            input::placeholder {
                color: #cbd5e1;
            }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg,#caa44f,#f3d07a);
            color: #062d1b;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,.08);
            border-radius: 18px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,215,0,.15);
        }

        .stat-number {
            font-size: 40px;
            font-weight: bold;
            color: #facc15;
        }

        .stat-label {
            margin-top: 8px;
            color: #d1d5db;
        }

        .endpoint-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,.25);
            font-family: monospace;
            word-break: break-all;
        }

        @media(max-width:900px) {

            .content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <div class="badge">HFNC COACH API</div>

            <h1>HFNC Coaches</h1>

            <div class="subtitle">
                Manage coaches, registrations and operations from a single platform
            </div>
        </div>

        <div class="content">

            <div class="card">

                <div class="form-title">
                    Coach Registration
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter coach name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter email">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" placeholder="Enter phone number">
                </div>

                <button class="btn">
                    Register Coach
                </button>

            </div>

            <div class="stats">

                <div class="stat-card">
                    <div class="stat-number">174</div>
                    <div class="stat-label">Total Coaches</div>
                </div>

                <div class="stat-card">
                    <div class="stat-number">6</div>
                    <div class="stat-label">Active Coaches</div>
                </div>

                <div class="stat-card">
                    <div class="stat-number">1</div>
                    <div class="stat-label">API Endpoint</div>

                    <div class="endpoint-box">
                        /api/coaches
                    </div>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
