<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to HFNC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a4d3e 0%, #2d6a54 50%, #1f5843 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .welcome-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            max-width: 650px;
            width: 90%;
        }
        .welcome-container h1 {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #d4af7a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .welcome-container p {
            font-size: 16px;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
        }
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .nav-link {
            display: block;
            padding: 22px;
            background: white;
            color: #1a4d3e;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: left;
        }
        .nav-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
            background: #d4af7a;
            color: #1a4d3e;
        }
        .nav-link span {
            display: block;
            font-size: 13px;
            font-weight: normal;
            color: #666;
            margin-top: 8px;
        }
        .nav-link:hover span {
            color: #1a4d3e;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Welcome to HFNC</h1>
        <p>Your ultimate Nutrition Club Management Portal. Please select a module below to proceed.</p>
        
        <div class="links-grid">
            <a href="templates/index.html" class="nav-link">
                📋 Master People Entry
                <span>Manage your complete network of prospects, customers, and distributors</span>
            </a>
            <a href="templates/s2customers.html" class="nav-link">
                🛍️ S2-Customers
                <span>Track product purchases, coaching details, and customer reorders</span>
            </a>
        </div>
    </div>
</body>
</html>
